name: Playwright Tests

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

permissions:
  contents: write

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    env:
      ALLURE_REPORT_URL: https://evgeniyinline.github.io/diplom-JS-PW/
      ALLURE_ENDPOINT: https://allure.autotests.cloud/
      ALLURE_PROJECT_ID: 5230
      ALLURE_LAUNCH_NAME: "Diplom JS/PW #${{ github.run_number }}"
      ALLURE_TESTOPS_URL: https://allure.autotests.cloud/project/5230/launches
      ALLURE_NOTIFICATIONS_VERSION: 4.11.0

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Checkout Allure history
        uses: actions/checkout@v4
        if: always()
        continue-on-error: true
        with:
          ref: gh-pages
          path: gh-pages

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Setup allurectl
        uses: allure-framework/setup-allurectl@v1
        with:
          allure-endpoint: ${{ env.ALLURE_ENDPOINT }}
          allure-token: ${{ secrets.ALLURE_TOKEN }}
          allure-project-id: ${{ env.ALLURE_PROJECT_ID }}

      - name: Run Playwright tests
        env:
          CI: true
          ALLURE_LAUNCH_NAME: ${{ env.ALLURE_LAUNCH_NAME }}
          ALLURE_LAUNCH_TAGS: github-actions,playwright,javascript,diplom
          ALLURE_RESULTS: allure-results
          BASE_URL: https://calc-dev.v04.dev
          E2E_EMAIL: ${{ secrets.E2E_EMAIL }}
          E2E_PASSWORD: ${{ secrets.E2E_PASSWORD }}
        run: allurectl watch -- npx playwright test

      - name: Prepare Allure history
        if: always()
        run: |
          mkdir -p allure-results/history
          if [ -d gh-pages/history ]; then
            cp -r gh-pages/history/* allure-results/history/ || true
          fi

      - name: Generate Allure report
        if: always()
        run: npx allure@latest generate ./allure-results --config ./allurerc.mjs --output ./allure-report

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

      - name: Upload Allure report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-report
          path: allure-report/
          retention-days: 30

      - name: Deploy Allure report to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        if: always() && github.ref == 'refs/heads/main'
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: ./allure-report
          force_orphan: false
          user_name: github-actions[bot]
          user_email: github-actions[bot]@users.noreply.github.com
          commit_message: Update Allure report ${{ github.sha }}

      - name: Add Allure report link to summary
        if: always()
        run: |
          echo "### Allure Report" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "$ALLURE_REPORT_URL" >> "$GITHUB_STEP_SUMMARY"

      - name: Prepare Allure notifications summary
        if: always()
        run: node scripts/prepare-allure-notifications.js

      - name: Download Allure notifications
        if: always()
        run: |
          mkdir -p notifications
          curl --fail --show-error --silent --location \
            -o notifications/allure-notifications.jar \
            "https://github.com/qa-guru/allure-notifications/releases/download/${ALLURE_NOTIFICATIONS_VERSION}/allure-notifications-${ALLURE_NOTIFICATIONS_VERSION}.jar"

      - name: Send Telegram notification
        if: always()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          if [ -z "$TELEGRAM_BOT_TOKEN" ] || [ -z "$TELEGRAM_CHAT_ID" ]; then
            echo "Telegram secrets are not configured, skipping notification"
            exit 0
          fi

          java \
            "-DconfigFile=notifications/config.json" \
            "-Dnotifications.telegram.token=${TELEGRAM_BOT_TOKEN}" \
            "-Dnotifications.telegram.chat=${TELEGRAM_CHAT_ID}" \
            "-Dnotifications.telegram.replyTo=" \
            "-Dnotifications.base.project=Diplom JS/PW" \
            "-Dnotifications.base.environment=calc-dev" \
            "-Dnotifications.base.language=ru" \
            "-Dnotifications.base.allureFolder=." \
            "-Dnotifications.base.enableChart=true" \
            "-Dnotifications.base.enableSuitesPublishing=false" \
            "-Dnotifications.base.durationFormat=HH:mm:ss.SSS" \
            "-Dnotifications.base.reportLink=${ALLURE_REPORT_URL}" \
            "-Dnotifications.base.comment=Allure TestOps: ${ALLURE_TESTOPS_URL} | Artifacts: ${RUN_URL}" \
            "-Dnotifications.base.customData.run=${GITHUB_RUN_NUMBER}" \
            "-Dnotifications.base.customData.repository=${GITHUB_REPOSITORY}" \
            "-Dnotifications.base.customData.branch=${GITHUB_REF_NAME}" \
            "-Dnotifications.base.customData.commit=${GITHUB_SHA::7}" \
            -jar notifications/allure-notifications.jar
