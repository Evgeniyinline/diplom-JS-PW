name: Playwright Tests

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

permissions:
  contents: write

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    env:
      ALLURE_REPORT_URL: https://evgeniyinline.github.io/diplom-JS-PW/
      ALLURE_ENDPOINT: https://allure.autotests.cloud/
      ALLURE_PROJECT_ID: 5230
      ALLURE_LAUNCH_NAME: "Diplom JS/PW #${{ github.run_number }}"
      ALLURE_TESTOPS_URL: https://allure.autotests.cloud/project/5230/launches

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Checkout Allure history
        uses: actions/checkout@v4
        if: always()
        continue-on-error: true
        with:
          ref: gh-pages
          path: gh-pages

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Setup allurectl
        uses: allure-framework/setup-allurectl@v1
        with:
          allure-endpoint: ${{ env.ALLURE_ENDPOINT }}
          allure-token: ${{ secrets.ALLURE_TOKEN }}
          allure-project-id: ${{ env.ALLURE_PROJECT_ID }}

      - name: Run Playwright tests
        env:
          CI: true
          ALLURE_LAUNCH_NAME: ${{ env.ALLURE_LAUNCH_NAME }}
          ALLURE_LAUNCH_TAGS: github-actions,playwright,javascript,diplom
          ALLURE_RESULTS: allure-results
        run: allurectl watch -- npx playwright test

      - name: Prepare Allure history
        if: always()
        run: |
          mkdir -p allure-results/history
          if [ -d gh-pages/history ]; then
            cp -r gh-pages/history/* allure-results/history/ || true
          fi

      - name: Generate Allure report
        if: always()
        run: npx allure@latest generate ./allure-results --config ./allurerc.mjs --output ./allure-report

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

      - name: Upload Allure report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-report
          path: allure-report/
          retention-days: 30

      - name: Deploy Allure report to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        if: always() && github.ref == 'refs/heads/main'
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: ./allure-report
          force_orphan: false
          user_name: github-actions[bot]
          user_email: github-actions[bot]@users.noreply.github.com
          commit_message: Update Allure report ${{ github.sha }}

      - name: Add Allure report link to summary
        if: always()
        run: |
          echo "### Allure Report" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "$ALLURE_REPORT_URL" >> "$GITHUB_STEP_SUMMARY"

      - name: Send Telegram notification
        if: always()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TEST_STATUS: ${{ job.status }}
          BRANCH_NAME: ${{ github.ref_name }}
          ALLURE_TESTOPS_URL: ${{ env.ALLURE_TESTOPS_URL }}
          RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: node scripts/telegram-notification.js
