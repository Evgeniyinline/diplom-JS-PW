name: Playwright Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    env:
      ALLURE_REPORT_URL: https://evgeniyinline.github.io/diplom-JS-PW/

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Checkout Allure history
        uses: actions/checkout@v4
        if: always()
        continue-on-error: true
        with:
          ref: gh-pages
          path: gh-pages

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Run Playwright tests
        run: npx playwright test

      - name: Prepare Allure history
        if: always()
        run: |
          mkdir -p allure-results/history
          if [ -d gh-pages/history ]; then
            cp -r gh-pages/history/* allure-results/history/ || true
          fi

      - name: Generate Allure report
        if: always()
        run: npx allure@latest generate ./allure-results --config ./allurerc.mjs --output ./allure-report

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

      - name: Upload Allure report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-report
          path: allure-report/
          retention-days: 30

      - name: Deploy Allure report to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        if: always() && github.ref == 'refs/heads/main'
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: ./allure-report
          force_orphan: false

      - name: Add Allure report link to summary
        if: always()
        run: |
          echo "### Allure Report" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "$ALLURE_REPORT_URL" >> "$GITHUB_STEP_SUMMARY"

      - name: Send Telegram notification
        if: always()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TEST_STATUS: ${{ job.status }}
          BRANCH_NAME: ${{ github.ref_name }}
          RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          if [ -z "$TELEGRAM_BOT_TOKEN" ] || [ -z "$TELEGRAM_CHAT_ID" ]; then
            echo "Telegram secrets are not configured, skipping notification"
            exit 0
          fi

          if [ "$TEST_STATUS" = "success" ]; then
            STATUS_TEXT="PASSED"
          else
            STATUS_TEXT="FAILED"
          fi

          MESSAGE=$(cat <<EOF
          Playwright tests: ${STATUS_TEXT}
          Repository: ${GITHUB_REPOSITORY}
          Branch: ${BRANCH_NAME}
          Commit: ${GITHUB_SHA:0:7}
          Run: ${RUN_URL}
          Allure: ${ALLURE_REPORT_URL}
          EOF
          )

          curl -sS -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            --data "chat_id=${TELEGRAM_CHAT_ID}" \
            --data-urlencode "text=${MESSAGE}" \
            --data "disable_web_page_preview=true"
